<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    $if(description)$<meta name="description" content="$description$">$endif$
    <meta name="robots" content="index, follow">
    $if(canonical_url)$<link rel="canonical" href="$canonical_url$">$endif$
    <title>$if(title)$$title$$else$小學生筆記$endif$</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">

    <script>
        MathJax = {
            loader: {load: ['[tex]/textmacros']},
            tex: {packages: {'[+]': ['textmacros']}}
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <meta name="google-site-verification" content="Yzem9_xPjrCrNcCHmziBq7Ak2gQUxZeZ29IQMvNZdkc" />
</head>
<body>
    <header>
        <nav>
            <a href="index.html"$if(is_home)$ class="current"$endif$>Home</a>
            <a href="archive.html"$if(is_archive)$ class="current"$endif$>Archive</a>
        </nav>
    </header>
    <main>
      <h1>$title$</h1>
      $if(date)$<p class="post-date">$date$</p>$endif$
      
      $if(toc)$
      <input type="checkbox" id="toc-toggle" class="toc-toggle">
      <label for="toc-toggle">
        <nav id="TOC">
          $toc$
        </nav>
      </label>
      $endif$
      
      $body$
    </main>
</body>
</html>
